<!DOCTYPE html>
<!--
  Framework-agnostic accessible Combobox (editable, list autocomplete).

  Pattern (WAI-ARIA APG — "Editable Combobox With List Autocomplete"):
    - A text <input role="combobox" aria-expanded aria-controls
      aria-autocomplete="list"> paired with a <ul role="listbox"> of
      <li role="option"> items.
    - DOM focus stays on the input AT ALL TIMES. The visually-active option is
      tracked with aria-activedescendant on the input (pointing at the option's
      id) — focus is NEVER moved into the listbox.
    - Typing filters the options and opens the listbox (aria-expanded="true").
      When the input is empty or the popup is closed, aria-expanded="false".

  Keyboard:
    - Down / Up move the active option (set aria-activedescendant, wrap) and
      scroll it into view.
    - Enter selects the active option (fills the input, closes, keeps focus on
      the input).
    - Escape closes the listbox; a second press clears the input.
    - Home / End jump to the first / last visible option.
    - Clicking an option selects it; clicking outside closes.

  The active option is marked both visually (class) and with
  aria-selected="true" — never color alone. An aria-live region announces the
  result count for screen-reader users.
  All colors/spacing come from CSS custom properties (design tokens).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accessible combobox</title>
    <style>
      :root {
        /* Design tokens — override these from your token system. */
        --color-surface: #ffffff;
        --color-on-surface: #1a1a1a;
        --color-accent: #2563eb;
        --color-on-accent: #ffffff;
        --color-border: #d4d4d8;
        --color-hover: #f1f5f9;
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --radius-md: 0.5rem;
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.12);
        --focus-ring: 2px solid var(--color-accent);
      }

      body {
        font-family: system-ui, sans-serif;
        color: var(--color-on-surface);
        background: var(--color-surface);
        padding: var(--space-4);
      }

      .combobox {
        position: relative;
        max-inline-size: 20rem;
      }

      .combobox__label {
        display: block;
        margin-block-end: var(--space-1);
        font-weight: 600;
      }

      .combobox__input {
        inline-size: 100%;
        min-block-size: 24px;
        padding: var(--space-2) var(--space-3);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        background: var(--color-surface);
        color: inherit;
        font: inherit;
      }

      .combobox__input:focus-visible {
        outline: var(--focus-ring);
        outline-offset: 2px;
      }

      .combobox__listbox {
        position: absolute;
        inset-block-start: calc(100% + var(--space-1));
        inset-inline: 0;
        max-block-size: 14rem;
        margin: 0;
        padding: var(--space-1);
        overflow-y: auto;
        list-style: none;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-md);
        z-index: 10;
      }

      .combobox__listbox[hidden] {
        display: none;
      }

      .combobox__option {
        padding: var(--space-2) var(--space-3);
        border-radius: var(--radius-md);
        cursor: pointer;
      }

      .combobox__option:hover {
        background: var(--color-hover);
      }

      /* Active option: high-contrast fill AND a visible marker (not color
         alone). aria-activedescendant points the input at this option. */
      .combobox__option[aria-selected="true"] {
        background: var(--color-accent);
        color: var(--color-on-accent);
        font-weight: 600;
      }
      .combobox__option[aria-selected="true"]::after {
        content: " \2713"; /* check mark — non-color cue */
      }

      /* Visually hidden but available to assistive tech (status region). */
      .visually-hidden {
        position: absolute;
        inline-size: 1px;
        block-size: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <h1>Combobox example</h1>

    <div class="combobox" id="framework-combobox">
      <label class="combobox__label" id="framework-label" for="framework-input">
        Favorite framework
      </label>
      <input
        class="combobox__input"
        id="framework-input"
        type="text"
        role="combobox"
        aria-expanded="false"
        aria-controls="framework-listbox"
        aria-autocomplete="list"
        aria-labelledby="framework-label"
        autocomplete="off"
      />
      <ul
        class="combobox__listbox"
        id="framework-listbox"
        role="listbox"
        aria-labelledby="framework-label"
        hidden
      ></ul>
      <!-- Polite live region announces the number of matches. -->
      <div class="visually-hidden" role="status" aria-live="polite"></div>
    </div>

    <script>
      const OPTIONS = [
        'React',
        'Vue',
        'Svelte',
        'Angular',
        'Solid',
        'Preact',
      ];

      document.querySelectorAll('.combobox').forEach((root) => {
        const input = root.querySelector('[role="combobox"]');
        const listbox = root.querySelector('[role="listbox"]');
        const status = root.querySelector('[role="status"]');
        const listboxId = listbox.id;

        let activeIndex = -1; // index into the currently-rendered options
        let optionEls = []; // <li role="option"> for the current filter

        const isOpen = () => input.getAttribute('aria-expanded') === 'true';

        // Render the options that match `query`, rebuilding the listbox.
        function filter(query) {
          const q = query.trim().toLowerCase();
          const matches = q
            ? OPTIONS.filter((o) => o.toLowerCase().includes(q))
            : OPTIONS.slice();

          listbox.innerHTML = '';
          optionEls = matches.map((label, i) => {
            const li = document.createElement('li');
            li.className = 'combobox__option';
            li.id = `${listboxId}-option-${i}`;
            li.setAttribute('role', 'option');
            li.setAttribute('aria-selected', 'false');
            li.textContent = label;
            // Use mousedown (fires before input blur) so the click registers.
            li.addEventListener('mousedown', (event) => {
              event.preventDefault(); // keep DOM focus on the input
              selectOption(i);
            });
            listbox.appendChild(li);
            return li;
          });

          return matches;
        }

        function open() {
          if (optionEls.length === 0) return close();
          listbox.hidden = false;
          input.setAttribute('aria-expanded', 'true');
        }

        function close() {
          listbox.hidden = true;
          input.setAttribute('aria-expanded', 'false');
          setActive(-1); // clear aria-activedescendant
        }

        // Move the visual highlight + aria-activedescendant. DOM focus does NOT
        // move — the input keeps focus; the input merely *points* at the option.
        function setActive(index) {
          if (optionEls[activeIndex]) {
            optionEls[activeIndex].setAttribute('aria-selected', 'false');
          }
          activeIndex = index;
          if (index < 0 || !optionEls[index]) {
            input.removeAttribute('aria-activedescendant');
            return;
          }
          const el = optionEls[index];
          el.setAttribute('aria-selected', 'true');
          input.setAttribute('aria-activedescendant', el.id);
          el.scrollIntoView({ block: 'nearest' });
        }

        function moveActive(delta) {
          if (!isOpen()) {
            open();
            // First arrow press just opens + highlights an edge option.
            setActive(delta > 0 ? 0 : optionEls.length - 1);
            return;
          }
          const max = optionEls.length - 1;
          let next = activeIndex + delta;
          if (next < 0) next = max; // wrap
          if (next > max) next = 0; // wrap
          setActive(next);
        }

        function selectOption(index) {
          const el = optionEls[index];
          if (!el) return;
          input.value = el.textContent;
          close();
          input.focus(); // ensure focus stays on the input
        }

        function announce(count) {
          status.textContent = count
            ? `${count} result${count === 1 ? '' : 's'} available.`
            : 'No results.';
        }

        // --- Typing filters and opens ---
        input.addEventListener('input', () => {
          const matches = filter(input.value);
          if (input.value.trim() === '') {
            close();
          } else {
            open();
            setActive(-1);
          }
          announce(matches.length);
        });

        // --- Keyboard ---
        input.addEventListener('keydown', (event) => {
          switch (event.key) {
            case 'ArrowDown':
              event.preventDefault();
              moveActive(1);
              break;
            case 'ArrowUp':
              event.preventDefault();
              moveActive(-1);
              break;
            case 'Home':
              if (isOpen()) {
                event.preventDefault();
                setActive(0);
              }
              break;
            case 'End':
              if (isOpen()) {
                event.preventDefault();
                setActive(optionEls.length - 1);
              }
              break;
            case 'Enter':
              if (isOpen() && activeIndex >= 0) {
                event.preventDefault();
                selectOption(activeIndex);
              }
              break;
            case 'Escape':
              event.preventDefault();
              if (isOpen()) {
                close(); // first press closes
              } else {
                input.value = ''; // second press clears
                announce(0);
              }
              break;
          }
        });

        // Open on focus/click if there's text to match.
        input.addEventListener('click', () => {
          if (!isOpen() && input.value.trim() !== '') {
            filter(input.value);
            open();
          }
        });

        // Clicking outside closes.
        document.addEventListener('pointerdown', (event) => {
          if (!root.contains(event.target)) close();
        });

        // Prime the option list (closed) so the first arrow press has data.
        filter('');
      });
    </script>
  </body>
</html>
